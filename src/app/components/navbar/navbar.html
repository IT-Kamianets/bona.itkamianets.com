<header
  class="fixed top-0 inset-x-0 z-50 transition-all duration-500"
  [ngClass]="isScrolled()
    ? 'bg-forest shadow-soft-lg py-0'
    : 'bg-transparent py-0'"
  role="banner"
>
  <div class="max-w-7xl mx-auto px-5 sm:px-8 lg:px-10">
    <div
      class="flex items-center justify-between transition-all duration-500"
      [ngClass]="isScrolled() ? 'h-16' : 'h-20'"
    >

      <!-- Logotype -->
      <a href="#hero" (click)="closeMenu()" class="flex items-center gap-3.5" aria-label="Bona — на початок">
        <span class="brand-script text-3xl text-gold leading-none">Bona</span>
        <span
          class="hidden sm:block text-[8px] uppercase tracking-widest2 border-l pl-3 transition-colors duration-300"
          [ngClass]="isScrolled() ? 'text-white/50 border-white/20' : 'text-white/50 border-white/20'"
        >Ресторація</span>
      </a>

      <!-- Desktop nav -->
      <nav class="hidden lg:flex items-center gap-1" aria-label="Головна навігація">
        @for (link of navLinks; track link.href) {
          <a
            [href]="link.href"
            class="px-4 py-2 text-[11px] uppercase tracking-widest font-medium transition-all duration-300 rounded-sm"
            [ngClass]="isScrolled()
              ? 'text-white/70 hover:text-white hover:bg-white/8'
              : 'text-white/70 hover:text-white hover:bg-white/10'"
          >{{ link.label }}</a>
        }
        <a
          href="https://expz.menu/dd5770f6-fda3-408e-b260-daebece5faba"
          target="_blank"
          rel="noopener noreferrer"
          class="ml-4 px-5 py-2.5 text-[10px] uppercase tracking-widest font-semibold
                 bg-gold-gradient text-white shadow-gold rounded-sm
                 transition-all duration-300 hover:brightness-110 hover:shadow-gold hover:scale-[1.02]"
        >Меню</a>
      </nav>

      <!-- Burger -->
      <button
        class="lg:hidden flex flex-col justify-center items-center w-10 h-10 gap-[5px]"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen()"
        aria-controls="mobile-nav"
        aria-label="Відкрити навігацію"
      >
        <span class="block w-5 h-[1.5px] bg-white transition-all duration-300 origin-center"
          [ngClass]="isMenuOpen() ? 'rotate-45 translate-y-[6.5px]' : ''"></span>
        <span class="block w-5 h-[1.5px] bg-white transition-all duration-300"
          [ngClass]="isMenuOpen() ? 'opacity-0 scale-x-0' : ''"></span>
        <span class="block w-5 h-[1.5px] bg-white transition-all duration-300 origin-center"
          [ngClass]="isMenuOpen() ? '-rotate-45 -translate-y-[6.5px]' : ''"></span>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  @if (isMenuOpen()) {
    <nav
      id="mobile-nav"
      class="lg:hidden bg-forest border-t border-white/10"
      aria-label="Мобільна навігація"
    >
      <ul class="max-w-7xl mx-auto px-5 sm:px-8 py-4 space-y-0.5">
        @for (link of navLinks; track link.href) {
          <li>
            <a
              [href]="link.href"
              (click)="closeMenu()"
              class="flex items-center px-4 py-3 text-sm text-white/70 hover:text-white hover:bg-white/8
                     rounded-sm transition-all duration-200 tracking-wide"
            >{{ link.label }}</a>
          </li>
        }
        <li class="pt-3 mt-2 border-t border-white/10">
          <a
            href="https://expz.menu/dd5770f6-fda3-408e-b260-daebece5faba"
            target="_blank"
            rel="noopener noreferrer"
            (click)="closeMenu()"
            class="flex items-center gap-2 px-4 py-3 text-sm font-semibold text-gold tracking-wide"
          >
            Переглянути меню
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
            </svg>
          </a>
        </li>
      </ul>
    </nav>
  }
</header>
